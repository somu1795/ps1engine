<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS1 Engine - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            overflow: hidden;
        }

        .admin-table th,
        .admin-table td {
            padding: 1.2rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .admin-table th {
            background: rgba(124, 77, 255, 0.1);
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .cpu-badge {
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .cpu-low {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .cpu-med {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
        }

        .cpu-high {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .refresh-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Admin Dashboard</h1>
            <p>Global System Monitoring & Control</p>
        </header>

        <div class="refresh-bar">
            <div>
                <span id="container-count">0</span> Active Sessions
            </div>
            <div style="display: flex; gap: 1.5rem; align-items: center;">
                <div style="font-size: 0.9rem; color: var(--text-secondary);">
                    Host CPU: <span id="host-cpu" style="color: var(--accent); font-weight: 600;">0%</span>
                </div>
                <div style="font-size: 0.9rem; color: var(--text-secondary);">
                    Host RAM: <span id="host-ram" style="color: var(--accent); font-weight: 600;">0%</span>
                </div>
                <button class="btn btn-resume" onclick="loadSessions()">🔄 Refresh Live Data</button>
            </div>
        </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>Owner (ID)</th>
                    <th>Game Name</th>
                    <th>CPU (Allocated)</th>
                    <th>Memory</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="admin-tbody">
                <!-- Data will be injected here -->
            </tbody>
        </table>
    </div>

    <script>
        async function loadSessions() {
            const tbody = document.getElementById('admin-tbody');
            const countLabel = document.getElementById('container-count');
            const hostCpuLabel = document.getElementById('host-cpu');
            const hostRamLabel = document.getElementById('host-ram');

            try {
                const response = await fetch('/api/admin/sessions');
                if (!response.ok) {
                    if (response.status === 401) {
                        alert('Unauthorized. Please refresh and log in.');
                    }
                    return;
                }
                const data = await response.json();
                const sessions = data.sessions || [];
                const host = data.host || { cpu: 0, ram: 0 };

                countLabel.innerText = sessions.length;
                hostCpuLabel.innerText = host.cpu + '%';
                hostRamLabel.innerText = host.ram + '%';
                tbody.innerHTML = '';

                if (sessions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-secondary);">No running sessions found</td></tr>';
                    return;
                }

                sessions.sort((a, b) => b.cpu_percent - a.cpu_percent).forEach(session => {
                    const row = document.createElement('tr');

                    // Normalized color logic (100% = full quota)
                    const cpuClass = session.cpu_percent < 30 ? 'cpu-low' : (session.cpu_percent < 80 ? 'cpu-med' : 'cpu-high');

                    row.innerHTML = `
                        <td><code>${session.owner.substring(0, 12)}...</code></td>
                        <td style="font-weight: 600;">${session.game_name}</td>
                        <td><span class="cpu-badge ${cpuClass}">${session.cpu_percent.toFixed(1)}%</span></td>
                        <td style="color: var(--text-secondary);">${session.memory_mb} MB</td>
                        <td><span style="color: #4caf50;">● ${session.status}</span></td>
                        <td>
                            <button class="btn btn-stop" onclick="killSession('${session.session_id}')">Kill Session</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading admin data:', error);
            }
        }

        async function killSession(sessionId) {
            if (!confirm(`Are you sure you want to terminate session ${sessionId}?`)) return;

            try {
                const response = await fetch(`/api/admin/stop-session/${sessionId}`, { method: 'POST' });
                if (response.ok) {
                    loadSessions();
                } else {
                    alert('Failed to terminate session');
                }
            } catch (err) {
                alert('Connection error');
            }
        }

        // Auto-refresh every 10 seconds
        loadSessions();
        setInterval(loadSessions, 10000);
    </script>
</body>

</html>
